on:
  workflow_call:
env:
  OMP_NUM_THREADS: '10'
  MKL_THREADING_LAYER: GNU
jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install clang-format
        run: |
            sudo apt-get update -y
            sudo apt-get install -y wget
            sudo apt install -y lsb-release wget software-properties-common gnupg
            wget https://apt.llvm.org/llvm.sh
            chmod u+x llvm.sh
            sudo ./llvm.sh 21
            sudo apt-get install -y git-core clang-format-21
      - name: Verify clang-format
        run: |
            git ls-files | grep -E  '\.(cpp|h|cu|cuh)$' | xargs clang-format-21 -i
            if git diff --quiet; then
              echo "Formatting OK!"
            else
              echo "Formatting not OK!"
              echo "------------------"
              git --no-pager diff --color
              exit 1
            fi
  linux-x86_64-cmake:
    name: Linux x86_64 (cmake)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Test (cmake)
        uses: ./.github/actions/build_cmake
      - name: Build C++ demos
        run: |
          make -C build demo_diversity_result_handler
  linux-x86_64-AVX2-cmake:
    name: Linux x86_64 AVX2 (cmake)
    needs: linux-x86_64-cmake
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Test (cmake)
        uses: ./.github/actions/build_cmake
        with:
          opt_level: avx2
  linux-x86_64-AVX512-cmake:
    name: Linux x86_64 AVX512 (cmake)
    needs: linux-x86_64-cmake
    runs-on: faiss-aws-m7i.large
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Test (cmake)
        uses: ./.github/actions/build_cmake
        with:
          opt_level: avx512
  linux-x86_64-AVX512_SPR-cmake:
    name: Linux x86_64 AVX512_SPR (cmake)
    needs: linux-x86_64-cmake
    runs-on: faiss-aws-m7i.large
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Test (cmake)
        uses: ./.github/actions/build_cmake
        with:
          opt_level: avx512_spr
  linux-x86_64-DD-cmake:
    name: Linux x86_64 Dynamic Dispatch (cmake)
    needs: linux-x86_64-cmake
    runs-on: faiss-aws-m7i.large
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Test (cmake)
        uses: ./.github/actions/build_cmake
        with:
          opt_level: dd
  linux-x86_64-GPU-cmake:
    name: Linux x86_64 GPU (cmake)
    needs: linux-x86_64-cmake
    runs-on: 4-core-ubuntu-gpu-t4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Test (cmake)
        uses: ./.github/actions/build_cmake
        with:
          gpu: ON
  linux-x86_64-GPU-w-ROCm-cmake:
    name: Linux x86_64 GPU w/ ROCm (cmake)
    needs: linux-x86_64-cmake
    runs-on: linux-amd-rocm-mi325-ubuntu-24
    container:
      image: ubuntu:24.04
      options: --device=/dev/kfd --device=/dev/dri --ipc=host --shm-size 16G --group-add video --cap-add=SYS_PTRACE --cap-add=SYS_ADMIN
    steps:
      - name: Container setup
        run: |
            if [ -f /.dockerenv ]; then
              apt-get update && apt-get install -y sudo && apt-get install -y git
              git config --global --add safe.directory '*'
            else
              echo 'Skipping. Current job is not running inside a container.'
            fi
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Test (cmake)
        uses: ./.github/actions/build_cmake
        with:
          gpu: ON
          rocm: ON
  linux-x86_64-GPU-w-CUVS-cmake:
    name: Linux x86_64 GPU w/ cuVS (cmake)
    needs: linux-x86_64-cmake
    runs-on: 4-core-ubuntu-gpu-t4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Test (cmake)
        uses: ./.github/actions/build_cmake
        with:
          gpu: ON
          cuvs: ON
  linux-arm64-SVE-cmake:
    name: Linux arm64 SVE (cmake)
    needs: linux-x86_64-cmake
    runs-on: faiss-aws-r8g.large
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Test (cmake)
        uses: ./.github/actions/build_cmake
        with:
          opt_level: sve
        env:
          # Context: https://github.com/facebookresearch/faiss/wiki/Troubleshooting#surprising-faiss-openmp-and-openblas-interaction
          OPENBLAS_NUM_THREADS: '1'
  linux-arm64-DD-cmake:
    name: Linux arm64 Dynamic Dispatch (cmake)
    needs: linux-x86_64-cmake
    runs-on: faiss-aws-r8g.large
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Test (cmake)
        uses: ./.github/actions/build_cmake
        with:
          opt_level: dd
        env:
          OPENBLAS_NUM_THREADS: '1'
  linux-x86_64-conda:
    name: Linux x86_64 (conda)
    needs: linux-x86_64-cmake
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Build and Package (conda)
        uses: ./.github/actions/build_conda
  windows-x86_64-DD-cmake:
    name: Windows x86_64 Dynamic Dispatch (cmake)
    needs: linux-x86_64-cmake
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.12'
          miniforge-version: latest
          channels: conda-forge
      - name: Install dependencies
        shell: pwsh
        run: |
          conda install -y -q cmake swig "numpy>=2.0,<3.0" scipy pytest gflags setuptools
          conda install -y -q mkl=2024.2.2 mkl-devel=2024.2.2
      - name: Build
        shell: pwsh
        run: |
          $pythonExe = (Get-Command python).Source
          $pythonDir = Split-Path $pythonExe
          # Add Python libs dir so MSVC linker can find python312.lib
          $env:LIB = "$pythonDir\libs;$env:LIB"
          cmake -B build -T v143 -A x64 -G "Visual Studio 17 2022" `
            -DBUILD_TESTING=ON `
            -DBUILD_SHARED_LIBS=ON `
            -DFAISS_ENABLE_GPU=OFF `
            -DFAISS_OPT_LEVEL=dd `
            -DFAISS_ENABLE_PYTHON=ON `
            -DFAISS_ENABLE_C_API=OFF `
            -DBLA_VENDOR=Intel10_64_dyn `
            -DCMAKE_BUILD_TYPE=Release `
            -DPython_ROOT_DIR="$pythonDir" `
            .
          # Add faiss.dll and dependency DLLs to PATH for GoogleTest discovery
          $env:PATH = "$PWD\build\faiss\Release;$env:CONDA_PREFIX\Library\bin;$env:PATH"
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
      - name: C++ tests
        shell: pwsh
        run: |
          # Copy all required DLLs next to the test executable:
          # faiss.dll, gtest/gtest_main DLLs, and conda dependency DLLs
          Copy-Item build\faiss\Release\*.dll build\tests\Release\
          Copy-Item build\bin\Release\*.dll build\tests\Release\
          Copy-Item "$env:CONDA_PREFIX\Library\bin\*.dll" build\tests\Release\ -ErrorAction SilentlyContinue
          $env:PATH = "$env:CONDA_PREFIX\Library\bin;$env:PATH"
          cd build
          ctest --output-on-failure -C Release -E "SIMDConfig.modern_hardware_has_simd_support"
      - name: Install Python extension
        shell: pwsh
        run: |
          $repoRoot = $PWD.Path
          $env:PATH = "$repoRoot\build\faiss\Release;$env:CONDA_PREFIX\Library\bin;$env:PATH"
          cd build\faiss\python
          python setup.py install
          # Copy faiss.dll and MKL DLLs next to the installed _swigfaiss.pyd
          $siteDir = python -c "import sysconfig; print(sysconfig.get_paths()['purelib'])"
          $siteDir = "$siteDir\faiss"
          Copy-Item "$repoRoot\build\faiss\Release\faiss.dll" $siteDir\
          Copy-Item "$env:CONDA_PREFIX\Library\bin\mkl_*.dll" $siteDir\ -ErrorAction SilentlyContinue
          Copy-Item "$env:CONDA_PREFIX\Library\bin\libiomp5md.dll" $siteDir\ -ErrorAction SilentlyContinue
      - name: Python tests
        shell: pwsh
        run: |
          $env:PATH = "$env:CONDA_PREFIX\Library\bin;$env:PATH"
          $tests = (Get-ChildItem tests/test_*.py).FullName
          pytest $tests
  windows-x86_64-conda:
    name: Windows x86_64 (conda)
    needs: linux-x86_64-cmake
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Build and Package (conda)
        uses: ./.github/actions/build_conda
  linux-arm64-conda:
    name: Linux arm64 (conda)
    needs: linux-x86_64-cmake
    runs-on: 2-core-ubuntu-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Build and Package (conda)
        uses: ./.github/actions/build_conda
  linux-x86_64-svs:
    name: Linux x86_64 w/ SVS (cmake)
    needs: linux-x86_64-cmake
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and Test (cmake)
        uses: ./.github/actions/build_cmake
        with:
          svs: ON
  index-io-backward-compatibility:
    needs: linux-x86_64-cmake
    name: Index serialization backward compatibility
    uses: ./.github/workflows/index-io-backward-compatibility.yml
